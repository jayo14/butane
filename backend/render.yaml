services:
  - type: web
    name: butane-backend
    runtime: docker
    plan: starter
    branch: main
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SITE_URL
        value: https://butane-backend.onrender.com
      - key: DB_ENGINE
        value: sqlite
      - key: DB_NAME
        value: db.sqlite3
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ACCESS_TOKEN_LIFETIME_MINUTES
        value: "60"
      - key: JWT_REFRESH_TOKEN_LIFETIME_DAYS
        value: "7"
      - key: CORS_ALLOWED_ORIGINS
        value: https://butane-frontend.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "true"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "true"
      - key: SECURE_HSTS_PRELOAD
        value: "true"
      - key: SECURE_CONTENT_TYPE_NOSNIFF
        value: "true"
      - key: SECURE_BROWSER_XSS_FILTER
        value: "true"
      - key: SECURE_REFERRER_POLICY
        value: strict-origin-when-cross-origin
      - key: SECURE_CROSS_ORIGIN_OPENER_POLICY
        value: same-origin
      - key: SECURE_CROSS_ORIGIN_EMBEDDER_POLICY
        value: require-corp
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: CSRF_COOKIE_SECURE
        value: "true"
      - key: SESSION_COOKIE_HTTPONLY
        value: "true"
      - key: CSRF_COOKIE_HTTPONLY
        value: "true"
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: CSRF_COOKIE_SAMESITE
        value: Lax
      - key: SECURE_PROXY_SSL_HEADER
        value: HTTP_X_FORWARDED_PROTO,https
      - key: DJANGO_LOG_LEVEL
        value: INFO
